{% extends "base.html" %}

{% block title %}Giriş ve Kayıt{% endblock %}

{% block content %}
<main class="auth-page">
  <section class="auth-panel auth-panel-wide" aria-labelledby="auth-home-title">
    <div class="auth-header">
      <p class="eyebrow">Airport Flight Management System</p>
      <h1 id="auth-home-title">Giriş ve Kayıt</h1>
      <p class="muted">Rolünüze göre işlem seçin.</p>
    </div>

    <div class="auth-options">
      <a class="option-button" href="{{ url_for('auth.admin_login') }}">Yönetici Giriş</a>
      <a class="option-button" href="{{ url_for('auth.admin_register') }}">Yönetici Kayıt</a>
      <a class="option-button" href="{{ url_for('auth.pilot_login') }}">Pilot Giriş</a>
      <a class="option-button" href="{{ url_for('auth.pilot_register') }}">Pilot Kayıt</a>
    </div>
  </section>
</main>
{% endblock %}
